syntax = "proto3";

import "google/protobuf/timestamp.proto";

option csharp_namespace = "UserProfileService.Proto";

// Сервис для управления пользователями
service UserProfileGrpcService {
  rpc GetAllUserProfiles(GetAllUserProfilesRequest) returns (GetAllUserProfilesResponse) {}
  rpc GetUserProfileById(GetUserProfileByIdRequest) returns (GetUserProfileByIdResponse) {}
}

/*REQUEST*/
//Получение всех пользовательских профилей
message GetAllUserProfilesRequest{
  int32 Page = 1;
  int32 PageSize = 2;
  optional string Search = 3;
  optional string SortBy = 4;
  optional string SortDirection = 5;
}

//Получение профиля пользователя
message GetUserProfileByIdRequest{
  string UserId = 1;
}

/*RESPONSE*/
//Ответ пользовательских профилей
message GetAllUserProfilesResponse{
  bool Success = 1;
  string ErrorMessage = 2;
  repeated UserProfileInfo UserProfiles = 3;
}

//Ответ пользовательского профиля
message GetUserProfileByIdResponse{
  bool Success = 1;
  string ErrorMessage = 2;
  UserProfileInfo UserProfile = 3;
}

//Информация о пользователях
message UserProfileInfo{
  string Id = 1;
  string Name = 2;
  string Nickname = 3;
  string AvatarUrl = 4;
  optional string StatusQuote = 5;
  bool IsBlocked = 6;
  bool IsDeleted = 7;
  string Status = 8;
  string UserId = 9;
}