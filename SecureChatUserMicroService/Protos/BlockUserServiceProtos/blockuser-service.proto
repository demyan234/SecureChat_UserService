syntax = "proto3";

import "google/protobuf/timestamp.proto";

option csharp_namespace = "BlockUserService.Proto";

// Сервис для управления пользователями
service BlockUserGrpcService {
  rpc GetAllBlocks(GetAllBlocksRequest) returns (GetAllBlocksResponse) {}
  rpc GetBlockById(GetBlockByIdRequest) returns (GetBlockByIdResponse) {}
  rpc AddNewBlockUser(AddNewBlockUserRequest) returns (AddNewBlockUserResponse) {}
  rpc UpdateBlock(UpdateBlockRequest) returns (UpdateBlockResponse) {}
  rpc DeactivateBlock(DeactivateBlockRequest) returns (DeactivateBlockResponse) {}
}

/*REQUEST*/
// Запрос вывода всех блокировок
message GetAllBlocksRequest{}

// Запрос вывода определенной блокировки
message GetBlockByIdRequest{
  string BlockId = 1;
}

// Запрос добавления новой блокировки
message AddNewBlockUserRequest{
  google.protobuf.Timestamp StartDate = 1;
  google.protobuf.Timestamp EndDate = 2;
  string UserProfileId = 3;
}

// Запрос изменения определенной блокировки
message UpdateBlockRequest{
  string Id = 1;
  optional google.protobuf.Timestamp StartDate = 2;
  optional google.protobuf.Timestamp EndDate = 3;
  optional bool IsActive = 4;
}

// Запрос деактивации определенной блокировки
message DeactivateBlockRequest{
  string BlockId = 1;
}

/*RESPONSE*/
// Ответ вывода всех блокировок
message GetAllBlocksResponse{
  bool Success = 1;
  string ErrorMessage = 2;
  repeated BlockUserInfo BlockUsers = 3;
}

// Ответ вывода определенной блокировки
message GetBlockByIdResponse{
  bool Success = 1;
  string ErrorMessage = 2;
  BlockUserInfo BlockUser = 3;
}

// Ответ добавления новой блокировки
message AddNewBlockUserResponse{
  bool Success = 1;
  string ErrorMessage = 2;
  string BlockId = 3;
}

// Ответ изменения определенной блокировки
message UpdateBlockResponse{
  bool Success = 1;
  string ErrorMessage = 2;
  BlockUserInfo UpdateBlockUser = 3;
}

// Ответ деактивации определенной блокировки
message DeactivateBlockResponse{
  bool Success = 1;
  string ErrorMessage = 2;
}

// Информация о блокировках
message BlockUserInfo{
  string Id = 1;
  google.protobuf.Timestamp StartDate = 2;
  google.protobuf.Timestamp EndDate = 3;
  string UserProfileId = 4;
  bool IsActive = 5;
}