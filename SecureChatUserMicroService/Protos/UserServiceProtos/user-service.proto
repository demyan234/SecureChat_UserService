syntax = "proto3";
option csharp_namespace = "UserService.Proto";

// Сервис для управления пользователями
service UserGrpcService {
  // Создание пользователя (вызывается только Auth сервисом)
  rpc CreateUser(CreateUserRequest) returns (UserResponse);

  // Обновление профиля пользователя
  rpc UpdateUser(UpdateUserRequest) returns (UserResponse);

  // Получение профиля пользователя
  rpc GetUser(GetUserRequest) returns (UserResponse);

  // Получение профиля пользователя
  rpc GetUsersFromSearch(GetUsersFromSearchRequest) returns (UsersListResponse);

  // Получение нескольких пользователей (для чатов)
  rpc GetUsers(GetUsersRequest) returns (UsersListResponse);

  // Удаление пользователя
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
}

message CreateUserRequest {
  string user_id = 1;
  string username = 2;
  string email = 3;
  string display_name = 4;
}

message UpdateUserRequest {
  string user_id = 1;
  optional string email = 2;
  optional string display_name = 3;
  optional string avatar_url = 4;
  optional string username = 5;
}

message GetUserRequest {
  string user_id = 1;
}

message GetUsersFromSearchRequest{
  string search_text = 1;
}

message GetUsersRequest {
  repeated string user_ids = 1;
}

message UserResponse {
  string user_id = 1;
  string username = 2;
  string email = 3;
  string display_name = 4;
  string avatar_url = 5;
  bool is_active = 6;
}

message UsersListResponse {
  repeated UserResponse users = 1;
  int32 total = 2;
}

message DeleteUserRequest {
  string user_id = 1;
}
message DeleteUserResponse {
  bool success = 1;
}